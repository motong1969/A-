name: A Share Daily Select

on:
  schedule:
    - cron: "10 8 * * 1-5"
  workflow_dispatch:
    inputs:
      email_test_only:
        description: "Only send a Gmail test using the saved 2026-06-23 report fixture"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: a-share-daily-select
  cancel-in-progress: false

jobs:
  daily-select:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Restore reports and history from daily-data
        if: github.event.inputs.email_test_only != 'true'
        run: bash scripts/ci_restore_daily_data.sh daily-data

      - name: Check trading day
        if: github.event.inputs.email_test_only != 'true'
        id: trading_day
        run: |
          set +e
          python3 scripts/check_trading_day.py
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "is_trading_day=true" >> "$GITHUB_OUTPUT"
          elif [ "$status" -eq 2 ]; then
            echo "is_trading_day=false" >> "$GITHUB_OUTPUT"
          else
            exit "$status"
          fi

      - name: Run realtime selector
        if: github.event.inputs.email_test_only != 'true' && steps.trading_day.outputs.is_trading_day == 'true'
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python3 scripts/run_realtime_select.py --sector-limit 0 --timeout-seconds 180

      - name: Build non-trading day report
        if: github.event.inputs.email_test_only != 'true' && steps.trading_day.outputs.is_trading_day == 'false'
        run: python3 scripts/build_fallback_report.py --date "$(date -u +%F)" --reason "今日不是交易日，系统发送例行状态邮件。"

      - name: Build Gmail test report
        if: github.event.inputs.email_test_only == 'true'
        run: python3 scripts/build_email_test_report.py --date 2026-06-23

      - name: Generate backtest report
        if: github.event.inputs.email_test_only != 'true' && steps.trading_day.outputs.is_trading_day == 'true'
        run: python3 report_backtest.py || true

      - name: Send Gmail test notification
        if: github.event.inputs.email_test_only == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python3 scripts/send_daily_email.py --fail-on-error --date 2026-06-23

      - name: Send Gmail notification
        if: github.event.inputs.email_test_only != 'true' && (steps.trading_day.outputs.is_trading_day == 'true' || steps.trading_day.outputs.is_trading_day == 'false')
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python3 scripts/send_daily_email.py --fail-on-error

      - name: Publish reports and history to daily-data
        if: github.event.inputs.email_test_only != 'true' && steps.trading_day.outputs.is_trading_day == 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/ci_publish_daily_data.sh daily-data "daily select $(date -u +%F)"

      - name: Upload artifacts
        if: github.event.inputs.email_test_only == 'true' || steps.trading_day.outputs.is_trading_day == 'true' || steps.trading_day.outputs.is_trading_day == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: daily-select-${{ github.run_id }}
          path: |
            reports/
            history/selection_history.csv
          if-no-files-found: error
          retention-days: 30
